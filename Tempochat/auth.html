<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempoChat | Sign In</title>
    <link rel="icon" type="image/jpeg" href="../img/logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body style="background: url('../img/bgpage-auth.jpg') center/cover no-repeat fixed;">

    <nav class="navbar navbar-expand-lg rounded-bottom">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="../img/logo.jpg" alt="TempoChat" width="32" height="32" class="me-2">
                TempoChat
            </a>

            <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-house me-1 d-inline-block d-md-none"></i> Overview</a></li>
                    <li class="nav-item"><a class="nav-link" href="pricing.html"><i class="fas fa-tag me-1 d-inline-block d-md-none"></i> Pricing Plan</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html"><i class="fas fa-info-circle me-1 d-inline-block d-md-none"></i> About TempoChat</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#footer"><i class="fas fa-envelope me-1 d-inline-block d-md-none"></i> Contact Us</a></li>
                </ul>

                <div class="d-flex align-items-center">
                    <a class="nav-link me-3" href="#"><i class="fas fa-code me-1"></i>For Developers ↗</a>
                    <a class="btn btn-dark px-4 py-2" href="https://github.com/phanminhquan1509-a11y/TempoChat" target="_blank" rel="noreferrer" style="margin-right: 10px;"><i class="fab fa-github me-2"></i>Source Code</a>
                    <div class="dropdown profile-dropdown">
                        <a class="btn btn-light dropdown-toggle d-flex align-items-center text-dark" href="#" role="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            <span class="profile-avatar"><i class="fas fa-user"></i></span>
                            <span class="profile-name ms-2 d-none d-md-inline">User0</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                            <li><a class="dropdown-item" href="account.html"><i class="fas fa-user-circle me-2"></i>Account</a></li>
                            <li><a class="dropdown-item" href="setting.html"><i class="fas fa-cog me-2"></i>Setting</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="auth.html"><i class="fas fa-sign-in-alt me-2"></i>Sign Up/Sign In</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="vh-100 d-flex align-items-center auth-section">
        <div class="container py-5 h-100">
            <div class="row d-flex justify-content-center align-items-center h-100">
                <div class="col-12 col-lg-10 col-xl-8">
                    <div class="card auth-card">
                        <div class="row g-0">
                            <div class="col-md-4 d-none d-md-block">
                                <img src="../img/authbanner.jpg" alt="TempoChat login image" class="img-fluid h-100" style="object-fit: cover;">
                            </div>
                            <div class="col-12 col-md-4 d-block d-md-none mb-4">
                                <img src="../img/authbanner.jpg" alt="TempoChat login image" class="img-fluid rounded" style="object-fit: cover;">
                            </div>
                            <div class="col-md-8">
                                <div class="card-body p-4 p-lg-5">
                                    <form method="post">
                                        <div class="d-flex align-items-center mb-3 pb-1">
                                            <i class="fas fa-comments fa-2x auth-logo me-3"></i>
                                            <span class="h1 fw-bold mb-0">TempoChat</span>
                                        </div>
                                        <h5 class="fw-normal mb-4 pb-3" style="letter-spacing: 1px;">Sign into your account</h5>
                                        <div class="form-floating mb-4">
                                            <input type="email" class="form-control" id="emailInput" placeholder="name@example.com">
                                            <label for="emailInput"><i class="fas fa-envelope me-2"></i>Email address</label>
                                        </div>
                                        <div class="form-floating mb-4">
                                            <input type="password" class="form-control" id="passwordInput" placeholder="Password">
                                            <label for="passwordInput"><i class="fas fa-lock me-2"></i>Password</label>
                                        </div>
                                        <div class="form-check mb-4">
                                            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                            <label class="form-check-label" for="rememberMe">
                                                Remember me
                                            </label>
                                        </div>
                                        <div class="pt-1 mb-4">
                                            <button class="btn btn-auth btn-lg w-100" type="submit">
                                                <i class="fas fa-sign-in-alt me-2"></i>Login
                                            </button>
                                        </div>
                                        <div class="d-flex justify-content-between align-items-center mb-4">
                                            <a class="text-muted" href="#!">
                                                <i class="fas fa-key me-1"></i>Forgot password?
                                            </a>
                                            <a class="text-muted" href="authregister.html">
                                                <i class="fas fa-user-plus me-1"></i>Register
                                            </a>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
