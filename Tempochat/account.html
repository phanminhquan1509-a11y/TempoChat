<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account - TempoChat</title>
  <link rel="icon" type="image/jpeg" href="../img/logo.jpg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/account.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body style="background: url('../img/bgpage-account.jpg') center/cover no-repeat fixed;">
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="../img/logo.jpg" alt="TempoChat" width="32" height="32" class="me-2">
        TempoChat
      </a>
      <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-house me-1 d-inline-block d-md-none"></i> Overview</a></li>
          <li class="nav-item"><a class="nav-link" href="pricing.html"><i class="fas fa-tag me-1 d-inline-block d-md-none"></i> Pricing Plan</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html"><i class="fas fa-info-circle me-1 d-inline-block d-md-none"></i> About TempoChat</a></li>
          <li class="nav-item"><a class="nav-link" href="#footer"><i class="fas fa-envelope me-1 d-inline-block d-md-none"></i> Contact Us</a></li>
        </ul>
        <div class="d-flex align-items-center">
          <a class="nav-link me-3" href="https://developers.google.com/">For Developers ↗</a>
          <a class="btn btn-dark px-4 py-2" href="https://github.com/phanminhquan1509-a11y/TempoChat" target="_blank" rel="noreferrer" style="margin-right: 10px;"><i class="fab fa-github me-2"></i>Source Code</a>
          <div class="dropdown profile-dropdown">
            <a class="btn btn-light dropdown-toggle d-flex align-items-center text-dark" href="#" role="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
              <span class="profile-avatar"><i class="fas fa-user"></i></span>
              <span class="profile-name ms-2 d-none d-md-inline">User0</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
              <li><a class="dropdown-item active" href="account.html"><i class="fas fa-user-circle me-2"></i>Account</a></li>
              <li><a class="dropdown-item" href="setting.html"><i class="fas fa-cog me-2"></i>Setting</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="auth.html"><i class="fas fa-sign-in-alt me-2"></i>Sign Up/Sign In</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10 col-xl-9 mx-auto">
        <div class="text-center mb-5">
          <h1 class="display-4 fw-bold mb-3"><i class="fas fa-user-circle me-2" style="color: var(--color-primary);"></i>My Account</h1>
          <p class="lead text-muted">Manage your profile information</p>
        </div>

        <div class="row g-4">
          <div class="col-12 col-md-4">
            <div class="card h-100 border-0 shadow-sm">
              <div class="card-body text-center py-4">
                <div class="profile-avatar-large mx-auto mb-3">
                  <i class="fas fa-user"></i>
                </div>
                <h4 class="fw-bold mb-1">User0</h4>
                <p class="text-muted mb-3">user0@tempochat.org</p>
                <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill mb-4"><i class="fas fa-star me-1"></i>Free Plan</span>
                
                <div class="d-flex flex-column gap-2 mt-4">
                  <div class="stat-card">
                    <h2 class="mb-0">0</h2>
                    <p class="mb-0">Rooms Created</p>
                  </div>
                  <div class="stat-card">
                    <h2 class="mb-0">0</h2>
                    <p class="mb-0">Messages Sent</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-8">
            <div class="card border-0 shadow-sm">
              <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                  <h5 class="fw-bold mb-0"><i class="fas fa-id-card me-2"></i>Profile Information</h5>
                  <button class="btn btn-outline-dark btn-sm"><i class="fas fa-edit me-1"></i>Edit</button>
                </div>
                <form>
                  <div class="row">
                    <div class="form-group col-md-6 mb-3">
                      <label for="firstname" class="form-label">First Name</label>
                      <input type="text" id="firstname" class="form-control" placeholder="User" />
                    </div>
                    <div class="form-group col-md-6 mb-3">
                      <label for="lastname" class="form-label">Last Name</label>
                      <input type="text" id="lastname" class="form-control" placeholder="0" />
                    </div>
                  </div>
                  <div class="form-group mb-3">
                    <label for="inputEmail4" class="form-label"><i class="fas fa-envelope me-2"></i>Email</label>
                    <input type="email" class="form-control" id="inputEmail4" placeholder="user0@tempochat.org" />
                  </div>
                  <div class="form-group mb-3">
                    <label for="inputAddress5" class="form-label"><i class="fas fa-map-marker-alt me-2"></i>Address</label>
                    <input type="text" class="form-control" id="inputAddress5" placeholder="Your address" />
                  </div>
                  <div class="form-row">
                    <div class="form-group col-md-6 mb-3">
                      <label for="inputCompany5" class="form-label"><i class="fas fa-building me-2"></i>Company</label>
                      <input type="text" class="form-control" id="inputCompany5" placeholder="Your company" />
                    </div>
                    <div class="form-group col-md-4 mb-3">
                      <label for="inputState5" class="form-label">State</label>
                      <select id="inputState5" class="form-control">
                        <option selected="">Choose...</option>
                        <option>...</option>
                      </select>
                    </div>
                    <div class="form-group col-md-2 mb-3">
                      <label for="inputZip5" class="form-label">Zip</label>
                      <input type="text" class="form-control" id="inputZip5" placeholder="00000" />
                    </div>
                  </div>
                  <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-dark"><i class="fas fa-save me-2"></i>Save Changes</button>
                    <button type="button" class="btn btn-outline-secondary"><i class="fas fa-times me-2"></i>Cancel</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
